<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header class="header-bar">
        <span class="title"><strong>Novastack | Login</strong> </span>

        <button class="menu-button" id="btn-menu">☰</button>

        <nav class="nav-bar hidden" id="nav-bar">
            <a href="../pages/cadastro.html">Cadastro</a>
        </nav>
    </header>

    <section class="container">
        <div class="message hidden" id="message">
        </div>
    </section>

    <main>
        <section class="container">
            <div class="card">
                <h2>Login</h2>
                <form id="form-login">

                    <label for="email-register">Email</label>
                    <input type="email" id="email-login" placeholder="email@exemplo.com" required>

                    <label for="password-register">Senha</label>
                    <input type="password" id="password-login" placeholder="••••••••" minlength="8" required>

                    <button type="submit">Login</button>
                </form>

                <p>Não tem uma conta? Faça o <a href="cadastro.html">Cadastro</a>.</p>
            </div>

        </section>
    </main>

</body>

<script type="module" src="../js/script.js"></script>
<script type="module" src="../API/request/requestLogin.js"></script>

</html>
