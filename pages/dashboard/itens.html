<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros</title>
    <link rel="stylesheet" href="../../styles/dashboard.css">
</head>

<body>
    <section class="dashboard">
        <aside class="sidebar">
            <h2>NovaStack</h2>

            <nav class="navbar">
                <button class="menu-item">
                    <span>Registrar</span>
                </button>

                <a href="catalogo.html" class="menu-item">Catálogo</a>

                <a href="./emprestimos.html" class="menu-item">Emprestimos</a>

                <a href="./clientes.html" class="menu-item">Clientes</a>
            </nav>

            <p>
                Gerencie livros, empréstimos e clientes de forma simples,
                rápida e organizada com o sistema da NovaStack.
            </p>

        </aside>

        <main class="main-container">
            <section class="register-book">
                <h2>Registre seu item!</h2>

                <hr>

                <div class="select-item">
                    <span>Informe o item que deseja cadastrar</span>

                    <select id="select-item">
                        <option value="book">Livro</option>
                        <option value="media">Mídia</option>
                        <option value="magazine">Periódicos</option>
                        <option value="monograph">Monografias</option>
                    </select>

                    <button id="confirm-item">Confirmar</button>
                </div>

                <section class="section-register hidden" id="section-form">
                    <form id="form-register">
                        <label for="title">Titulo</label>
                        <input type="text" id="title" placeholder="Titulo do item" required>

                        <label for="author">Autor</label>
                        <input type="text" id="author" placeholder="Autor do item" required>

                        <label for="date-publi">Data de publicação</label>
                        <input type="date" id="date-publi" required>

                        <div id="form-complement" class="complement">
                            <label for="category">Categoria</label>
                            <select id="category">
                                <option value="">Ação</option>
                                <option value="">Ficção</option>
                            </select>
                        </div>

                        <div class="button-form">
                            <button type="submit">Registrar</button>
                        </div>
                    </form>
                </section>
            </section>
        </main>

    </section>

</body>
<script type="module" src="../js/script.js"></script>
<script src="../../js/itens.js"></script>

</html>
